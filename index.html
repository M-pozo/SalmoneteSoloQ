<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SalmonETArmy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Favicon -->
  <link rel="icon" type="image/gif" href="mario.gif">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex flex-col items-center min-h-screen relative">

  <!-- Botón de registro arriba a la derecha -->
  <button id="openModal"
    class="fixed top-4 right-4 bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg shadow-lg z-50">
    Registrarse
  </button>

  <!-- Título centrado -->
  <h1 class="text-4xl font-bold mt-8 mb-6 text-center">SalmonETArmy</h1>
  
  <div class="flex gap-2 mb-4 justify-center">
    <button id="filterNonMain" class="px-4 py-1 bg-gray-600 text-white rounded hover:bg-gray-500">Torneo</button>
    <button id="filterMain" class="px-4 py-1 bg-gray-600 text-white rounded hover:bg-gray-500">Main</button>
    <button id="filterAll" class="px-4 py-1 bg-gray-600 text-white rounded hover:bg-gray-500">Todos</button>
  </div>
  
  <!-- Contenedor de jugadores centrado -->
  <div id="players" class="flex flex-col gap-4 w-full max-w-3xl mx-auto"></div>

  <!-- Modal -->
  <div id="modal"
  class="hidden fixed inset-0 backdrop-blur-md bg-black/50 flex items-center justify-center z-40">
  
  <div class="bg-gray-800 p-6 rounded-xl w-80 shadow-xl">
    <h2 class="text-xl mb-4">Registrar participante</h2>

    <input id="name" placeholder="Nombre" class="w-full mb-2 p-2 rounded bg-gray-700">
    <input id="tag" placeholder="Tag" class="w-full mb-2 p-2 rounded bg-gray-700">

    <!-- Zona de arrastre -->
    <div id="drop-zone"
      class="w-full h-32 mb-4 flex items-center justify-center border-2 border-dashed border-gray-500 rounded-lg cursor-pointer hover:border-green-400 transition">
      
      <span id="drop-text" class="text-gray-400 text-sm text-center">
        Arrastra una imagen aquí<br>o haz clic para seleccionar
      </span>

      <input id="image" type="file" accept="image/png, image/jpeg"
        class="hidden">
    </div>

    <!-- Toggle switch para cuenta main -->
    <div class="flex items-center justify-between mb-4">
      <span class="text-gray-300 text-sm">Cuenta Main</span>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" id="isMain" class="sr-only peer">
        <div class="w-12 h-6 bg-gray-500 rounded-full peer peer-checked:bg-green-600 transition-all"></div>
        <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow-md peer-checked:translate-x-6 transition-transform"></div>
      </label>
    </div>

    <button id="register"
      class="w-full bg-green-600 hover:bg-green-700 p-2 rounded">
      Registrar
    </button>
  </div>
</div>

  <script src="app.js"></script>
  <script src="interfaz.js"></script>
</body>
</html>
